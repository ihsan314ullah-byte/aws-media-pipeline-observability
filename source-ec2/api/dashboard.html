<!DOCTYPE html>
<html lang="en">

<head>
  <!-- ===============================================================
       PAGE METADATA
       ----------------------------------------------------------------
       Defines the document type, character encoding, page title, and
       all CSS used by the dashboard.
       =============================================================== -->
  <meta charset="UTF-8" />
  <title>Dashboard for AWS Media Pipeline</title>

  <style>

    /* ===============================================================
       GLOBAL PAGE STYLING
       ----------------------------------------------------------------
       Applies a clean background, default typography, spacing, and
       overall appearance for the monitoring dashboard.
       =============================================================== */
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      color: #1f2937;
      margin: 0;
      padding: 24px;
    }

    /* ===============================================================
       HERO SECTION
       ----------------------------------------------------------------
       Displays the dashboard title together with the AWS media pipeline
       architecture. The gradient visually distinguishes the header from
       the operational panels.
       =============================================================== */
    .hero {
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
      color: white;
      padding: 34px 28px;
      border-radius: 18px;
      margin-bottom: 24px;
      box-shadow: 0 14px 30px rgba(15, 23, 42, 0.25);
      text-align: center;
    }

    .hero h1 {
      font-size: 36px;
      margin: 0 0 6px 0;
    }

    .hero h2 {
      font-size: 23px;
      font-weight: 500;
      margin: 0 0 14px 0;
      color: #dbeafe;
    }

    .hero p {
      font-size: 15px;
      color: #eff6ff;
      line-height: 1.6;
      margin: 0;
    }

    /* ===============================================================
       DASHBOARD GRID
       ----------------------------------------------------------------
       Uses CSS Grid so cards automatically wrap depending on the
       available browser width.
       =============================================================== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
      gap: 18px;
    }

    /* ===============================================================
       INFORMATION CARDS
       ----------------------------------------------------------------
       Every functional area (metrics, controls, monitoring links,
       playback, etc.) is displayed inside an independent card.
       =============================================================== */
    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
      border: 1px solid #e5e7eb;
    }

    .card h2 {
      margin-top: 0;
      font-size: 18px;
      color: #111827;
    }

    /* ===============================================================
       BUTTON STYLING
       ----------------------------------------------------------------
       Standard buttons are blue while destructive actions (Stop FFmpeg)
       use red to indicate higher operational risk.
       =============================================================== */
    button {
      display: inline-block;
      margin: 6px 6px 6px 0;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }

    button:hover {
      background: #1d4ed8;
    }

    button.danger {
      background: #dc2626;
    }

    button.danger:hover {
      background: #b91c1c;
    }

    /* ===============================================================
       JWT TOKEN INPUT
       ----------------------------------------------------------------
       Stores the administrator JWT entered by the user. The browser
       uses this value when calling protected API endpoints.
       =============================================================== */
    input {
      width: 100%;
      padding: 11px;
      margin: 8px 0 12px 0;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
    }

    /* ===============================================================
       STATUS OUTPUT PANELS
       ----------------------------------------------------------------
       Used to display JSON responses, script output and runtime logs.
       =============================================================== */
    pre {
      background: #111827;
      color: #e5e7eb;
      padding: 14px;
      border-radius: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      font-size: 13px;
    }

    /* ===============================================================
       USER MESSAGE AREA
       ----------------------------------------------------------------
       Displays success messages, API responses, authentication errors,
       and operational status updates.
       =============================================================== */
    .message {
      margin-top: 22px;
      background: #111827;
      color: #e5e7eb;
      padding: 14px;
      border-radius: 10px;
      min-height: 48px;
      white-space: pre-wrap;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.12);
    }

    .small {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
    }

    /* ===============================================================
       SECURITY WARNING STYLE
       ----------------------------------------------------------------
       Visually highlights operations that require administrator JWT
       authentication.
       =============================================================== */
    .warning {
      background: #fff7ed;
      color: #9a3412;
      padding: 10px;
      border-radius: 8px;
      border-left: 4px solid #f97316;
    }

  </style>
</head>

<body>
